server:
  port: 8080
  grpc:
    port: 80

spring:
  application:
    name: cart-wishlist-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8084/realms/my_realm

  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: postgres
    password: igor333333
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: create
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka/
  instance:
    metadata-map:
      grpc-port: ${server.grpc.port}