version: '3.8'

services:
  redis:
    image: redis
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - /c/Users/foshi/Desktop/my_shop_3/config/redis/import:/data
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.4
    container_name: my_keycloak
    command: start-dev
    ports:
      - "8084:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - /c/Users/foshi/Desktop/my_shop_3/config/keycloak/import:/opt/keycloak/data/import
    restart: unless-stopped