version: '3.8'

services:
  redis:
    image: redis
    container_name: my_redis
    ports:
      - "6379:6379"
    volumes:
      - /c/Users/foshi/Desktop/my_shop_3/config/redis/import:/data
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.4
    container_name: my_keycloak
    command: start-dev
    ports:
      - "8084:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - /c/Users/foshi/Desktop/my_shop_3/config/keycloak/import:/opt/keycloak/data/import
    restart: unless-stopped

  postgres:
      image: postgres:latest
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: igor333333
        POSTGRES_DB: postgres
      ports:
        - "5433:5432"
      volumes:
        - /c/Users/foshi/Desktop/my_shop_3/config/postgres/import:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # Web API
      - "9001:9001"   # Web UI (админка)
    volumes:
      - /c/Users/foshi/Desktop/my_shop_3/config/minIO/import:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  zookeeper:    # кафка хранит метаданные топиков через него
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092     # !заменить localhost на kafka
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 10_485_760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 12_582_912

  eureka:
    image: eureka:1.0
    ports:
      - "8761:8761"

  cart-wishlist-service:
    image: cart-wishlist-service:1.0
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=igor333333
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      - postgres
      - keycloak
      - eureka

  user-service:
    image: user-service:1.0
    ports:
      - "8077:8077"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=igor333333
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - KEYCLOAK_CLIENT_SECRET=6DlpPd9Klby2eHwVrJUHX9pKeibJfuwq
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - keycloak
      - kafka
      - redis
      - eureka

  support-service:
      image: support-service:1.0
      ports:
        - "8079:8079"
      environment:
        - POSTGRES_HOST=postgres
        - POSTGRES_PORT=5432
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=igor333333
        - EUREKA_HOST=eureka
        - EUREKA_PORT=8761
        - KEYCLOAK_HOST=keycloak
        - KEYCLOAK_PORT=8080
        - KAFKA_HOST=kafka
        - KAFKA_PORT=9092
        - REDIS_HOST=redis
        - REDIS_PORT=6379

      depends_on:
        - postgres
        - keycloak
        - kafka
        - eureka

  media-service:
    image: media-service:1.0
    ports:
      - "8078:8078"
    environment:
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      - keycloak
      - kafka
      - minio
      - redis
      - eureka

  catalogue-service:
    image: catalogue-service:1.0
    ports:
      - "8082:8082"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=igor333333
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092

    depends_on:
      - postgres
      - keycloak
      - kafka
      - eureka


  email-service:
    image: email-service:1.0
    ports:
      - "8081:8081"
    environment:
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092

    depends_on:
      - keycloak
      - kafka
      - eureka

  frontend-service:
    image: frontend-service:1.0
    environment:
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080

    depends_on:
      - keycloak
      - eureka


  gateway-api:
    image: gateway-api:1.0
    ports:
      - "8087:8087"
    environment:
      - EUREKA_HOST=eureka
      - EUREKA_PORT=8761
    depends_on:
      - eureka


