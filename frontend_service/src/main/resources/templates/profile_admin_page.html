<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/loadingSpinner.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>
<main>

    <div class="container-fluid main">

        <div class="main-input">



                <div class="text-center my-4">
                    <div class="avatar-wrapper">
                        <img th:src="${user.avatarFileName == null} ? '/images/default-avatar.jpg' : '/api/media/images/user/avatar/get/' + ${user.avatarFileName}"
                             id="user-avatar" alt="User Avatar">

                        <div class="avatar-overlay">

                        </div>
                    </div>
                </div>



                <form class="pt-5" id="profile-form">
                <div class="alert alert-success" role="alert">Информация о пользователе.</div>

                <label for="nickName" class="col-sm-2 col-form-label"><h6>Никнейм:</h6></label>
                <input type="text" th:value="${user.nickName}" class="form-control" name="nickName" id="nickName" readonly>

                <label for="firstName" class="col-sm-2 col-form-label"><h6>Имя:</h6></label>
                <input type="text" th:value="${user.firstName}" class="form-control" name="firstName" id="firstName" readonly>

                <label for="lastName" class="col-sm-2 col-form-label"><h6>Фамилия:</h6></label>
                <input type="text" th:value="${user.lastName}" class="form-control" name="lastName" id="lastName" readonly>


                <label for="email" class="col-sm-2 col-form-label"><h6>Email: </h6></label>
                <input type="email" th:value="${user.email}" class="form-control" name="email" id="email" readonly>

                </form>

            <a href="/"><button type="submit" class="btn btn-outline-dark mt-4" id="form-submit-btn" >Вернуться на главную страницу</button></a>


        </div>



</main>
<div th:insert="~{fragments/support_chat :: #support-chat}"></div>






<script src="/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/cart_wish.js"></script>

</body>
</html>
