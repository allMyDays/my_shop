<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/loadingSpinner.css">
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>

<div class="container-fluid main">
  <h2 class="pt-5">Впервые на сайте? Создайте аккаунт!</h2>

  <form id="profile-form" class="pt-5">

    <label for="nickName" class="mt-3"><h6>Придумайте никнейм: </h6></label>
    <input class="form-control" name="nickName" placeholder="Никнейм" id="nickName">

    <label for="firstName" class="mt-3"><h6>Ваше имя: </h6></label>
    <input class="form-control" name="firstName" placeholder="Имя" id="firstName">

    <label for="lastName" class="mt-3"><h6>Ваша фамилия: </h6></label>
    <input class="form-control" name="lastName" placeholder="Фамилия" id="lastName">

    <label for="email" class="mt-3"><h6>Email: </h6></label>
    <input class="form-control" name="email" id="email" placeholder="Email" type="email">

    <label for="password" class="mt-3"><h6>Пароль: </h6></label>
    <input class="form-control" name="password" type="password" placeholder="Пароль" id="password" autocomplete="new-password">

    <label for="repeatedPassword" class="mt-3"><h6>Повторите пароль: </h6></label>
    <input class="form-control my-2" name="repeatedPassword" type="password" placeholder="Повторите пароль" id="repeatedPassword" autocomplete="new-password">
    <button class="btn btn-dark mt-3" type="submit" id="form-submit-btn">Зарегистрироваться</button>
  </form>
  <div class="loader my-4" style="display: none"></div>

  <div id="common-block">
  <div id="code-block" style="display:none;" class="mt-4">
    <p id="code-timer-text" class="alert-warning"></p>
    <input class="form-control my-2" id="code" placeholder="Введите код">
    <button class="btn btn-primary" onclick="verifyEmailCode()">Подтвердить</button>
  </div>

  <div id="message-block" class="mt-3"></div>
  </div>
</div>

<script>
  document.getElementById("profile-form").addEventListener("submit", function (e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    document.getElementById("common-block").style.display = "";
    const submitBTN = document.getElementById("form-submit-btn");
    const loadingIndicator = document.querySelector('.loader');
    submitBTN.style.display = "none";
    loadingIndicator.style.display="";

    const password = document.getElementById("password").value.trim();
    const repeatedPassword = document.getElementById("repeatedPassword").value.trim();
    const msg = document.getElementById("message-block");
    msg.innerHTML = ""; //очистить все ошибки

    if(!password||!repeatedPassword){
        msg.innerHTML += `<div class="alert alert-danger">Пожалуйте, заполните все строки ввода пароля.</div>`;
        submitBTN.style.display = "";
        loadingIndicator.style.display="none";
        return;
      }
      if(!(password===repeatedPassword)){
        msg.innerHTML += `<div class="alert alert-danger">Пароли не совпадют!</div>`;
        submitBTN.style.display = "";
        loadingIndicator.style.display="none";
        return;
      }
    fetch("/api/users/create", {
      method: "POST",
      headers: {
        'Content-type':'application/json'
      },
      body: JSON.stringify(Object.fromEntries(formData))

    })
            .then(res =>{
              if(!res.ok){
                submitBTN.style.display = "";
                loadingIndicator.style.display="none";
                msg.innerHTML += `<div class="alert alert-danger">Произошла ошибка. Попробуйте снова чуть позже.</div>`;
              } return res.json()})
            .then(data => {
              msg.innerHTML = "";

              if (data.ERRORS) {
                data.ERRORS.forEach(err => {
                  msg.innerHTML += `<div class="alert alert-danger">${err}</div>`;
                });
                submitBTN.style.display = "";
                loadingIndicator.style.display="none";
                return;
              }

              if (data.EMAIL_SENT) {
                loadingIndicator.style.display="none";
                msg.innerHTML = `<div class="alert alert-info">На адрес <b>${formData.get("email")}</b> был отправлен код. Введите его в течение 1 часа.</div>`;
                document.getElementById("email").readOnly = true;
                document.getElementById("code-block").style.display = "block";


                startTimer(60 * 60);
              }

              if (data.SUCCESS) {
                  msg.innerHTML = `<div class="alert alert-success">Вы успешно зарегистрировались! Теперь можете <a href="/users/welcome" >войти в свой аккаунт</a>.</div>`;
                document.getElementById("code-block").style.display = "none";
                loadingIndicator.style.display="none";
                submitBTN.style.display = "none";
              }
            });
  });

</script>


<script src="/js/main.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/cart_wish.js"></script>
<script src="/js/email_verification.js"></script>

</body>
</html>
