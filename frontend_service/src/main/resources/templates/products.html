<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/rating.css">
    <link rel="stylesheet" href="/css/loadingSpinner.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>

<input type="hidden" id="currentCategoryId" th:if="${categoryId!=null}" th:value="${categoryId}">
<input type="hidden" id="currentFilter" th:if="${filter!=null}" th:value="${filter}">


<main>

    <div class="container-fluid main" style="display:none" id="no-such-goods">
        <h1 class="pt-5">Похоже, что по данному запросу товаров нет!</h1>
    </div>



    <div id="product-container" class="container mt-5">
        <div class="row row-cols-1 row-cols-md-4 g-4" id="product-grid">
            <!-- Здесь будут подгружаться товары -->
        </div>
    </div>
</main>

<div id="products-loading-indicator"
     style="
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        background-color: rgba(255, 255, 255, 0.9);
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        z-index: 9999;
        display: none;
     ">
    Загрузка...
</div>







<div th:insert="~{fragments/support_chat :: #support-chat}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
<script src="/js/rating_view.js"></script>
<script src="/js/cart_wish.js"></script>
<script src="/js/cards_interactions.js"></script>
<script src="/js/support.js"></script>
<script src="/js/order.js"></script>
<script src="/js/productList.js"></script>
</body>
</html>
