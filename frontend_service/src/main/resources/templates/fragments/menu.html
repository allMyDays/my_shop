<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<header id="nav-menu">
    <div class="header-top">
        <div class="container-fluid">
            <div class="row">
                <div class="col-6 col-sm-4">
                    <a href="/"><img src="/images/logo.png" alt="logo" width="188"></a>
                </div>
                <div class="col-sm-4 d-none d-sm-block">
                    <div class="input-group mb-3 my-3">
                        <div style="width: 140px">
                        <select id="categorySelect" class="form-select" name="categoryId">
                            <option value="">Категории</option>
                        </select>
                        </div>
                        <input type="text" name="filter" id="main-search-input" class="form-control" th:value="${filter}" placeholder="Поиск товаров" aria-label="Recipient's username" aria-describedby="button-addon2">
                        <a onclick="mainSearchFind()"><button class="btn btn-outline-dark bg-white" type="submit" id="main-search-button"><i class="fa-solid fa-magnifying-glass"></i></button></a>
                    </div>

                </div>

                <div class="col-6 col-sm-4 my-1">

                    <div class="btn-group d-flex justify-content-end">

                        <div sec:authorize="!isAuthenticated()" class="me-1 entrance-buttons">
                            <button class="btn btn-dark" type="button"><a href="/users/welcome">Вход</a></button>


                            <button class="btn btn-dark" type="button"><a href="/users/registration">Регистрация</a></button>



                          </div>
                        <div sec:authorize="isAuthenticated()" class="me-1 d-flex justify-content-end my-1">
                            <div class="dropdown">
                                <button class="btn me-4 px-1 dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fa-solid fa-user"></i>
                                </button>

                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="/users/profile">Мой аккаунт</a></li>
                                    <li><a class="dropdown-item" href="#">Мой кошелек</a></li>
                                    <li><a class="dropdown-item" href="#">Настройки</a></li>
                                    <li><a class="dropdown-item" onClick="logout()">Выйти</a></li>

                                    <button type="button" class="btn btn-light" data-bs-toggle="modal" data-bs-target="#supportModal">
                                        Поддержка
                                    </button>


                                </ul>
                            </div>

                            <!-- кнопки поддержки -->
                            <div class="modal fade" id="supportModal" tabindex="-1" aria-labelledby="supportModalLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <a href="/"><img src="/images/logo.png" alt="logo" width="188"></a>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                        </div>
                                        <div class="modal-footer d-flex justify-content-between align-items-center">
                                            <a><button type="button" class="btn btn-outline-dark">Часто задаваемые вопросы (FAQ)</button></a>
                                            <div id="support-user-buttons" style="display: none;">
                                            <a onClick="openSupportChatList(false)"><button type="button" class="btn btn-outline-dark">Мои ранее созданные чаты</button></a>
                                            <a onclick="tryCreateNewSupportChat()" ><button type="button" class="btn btn-outline-dark my-2" data-bs-dismiss="modal">Создать новый чат поддержки</button></a>
                                            </div>
                                            <div id="support-agent-buttons" style="display: none;" >
                                                <a onClick="openSupportChatList(true)"><button type="button" class="btn btn-outline-dark">Ответить на вопросы пользователей</button></a>
                                                <a onclick="" ><button type="button" class="btn btn-outline-dark my-2" data-bs-dismiss="modal">Заблокированные в поддержке пользователи</button></a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Модальное окно ввода темы -->
                            <div class="modal fade" id="topicModal" tabindex="-1" aria-labelledby="topicModalLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <a href="/"><img src="/images/logo.png" alt="logo" width="188"></a>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                                        </div>
                                        <div class="modal-body">
                                            <h1 class="modal-title fs-5" id="topicModalLabel">Пожалуйста, введите тему обращения:</h1>
                                            <input type="text" id="support-topic-input" class="form-control my-4" placeholder="Например: Проблема с заказом" />
                                            <div id="topic-error" class="text-danger mt-2" style="display:none;">Тема должна иметь как минимум 4 символа и максимум 30.</div>
                                        </div>
                                        <div class="modal-footer">
                                            <a onclick="createNewSupportChat()"><button type="button" class="btn btn-dark">Продолжить</button></a>
                                        </div>
                                    </div>
                                </div>
                            </div>


                            <!-- Модальное окно списка чатов -->
                            <div class="modal fade" id="chatListModal" tabindex="-1" aria-labelledby="chatListModalLabel" aria-hidden="true">
                                <div class="modal-dialog modal-dialog-scrollable modal-lg">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title" id="chatListModalLabel">Ваши обращения в поддержку</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                                        </div>
                                        <div class="modal-body" style="max-height: 500px; overflow-y: auto;">
                                            <ul class="list-group" id="chat-list-container">
                                                <!-- Сюда динамически вставляется список чатов -->
                                            </ul>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-dark" data-bs-dismiss="modal">Закрыть</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Модальное окно удаления чата поддержки -->
                            <div class="modal fade" id="deleteSupportChatModal" tabindex="-1" aria-labelledby="deleteSupportChatModalLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <a href="/"><img src="/images/logo.png" alt="logo" width="188"></a>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                        </div>
                                        <div class="modal-body">
                                            Вы уверены, что хотите удалить этот чат? Отменить действие будет невозможно.
                                        </div>
                                        <div class="modal-footer">
                                            <a onclick="deleteSupportChat()"><button type="button" class="btn btn-dark">Удалить</button></a>
                                            <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Закрыть</button>
                                        </div>
                                    </div>
                                </div>
                            </div>













                            <div>
                                <button class="btn position-relative me-4 px-1" type="button"
                                        data-bs-toggle="offcanvas" data-bs-target="#offcanvasWish"
                                        aria-controls="offcanvasWish" onclick="loadWishList()">

        <span id="wish-count-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            0
            <span class="visually-hidden">товаров в избранном</span>
        </span>

                                    <i class="fa-solid fa-heart"></i>
                                </button>

                                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasWish" aria-labelledby="offcanvasWishLabel">
                                    <div class="offcanvas-header">
                                        <h3 class="offcanvas-title" id="offcanvasWishLabel">Список желаний</h3>
                                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
                                    </div>
                                    <div class="offcanvas-body">
                                        <table class="table mt-4">
                                            <tbody id="wish-items-table">
                                            <!-- AJAX будет вставлять сюда строки -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>



                            <!-- блок корзины -->


                            <div>
                                <button class="btn position-relative me-4 px-1" type="button"
                                        data-bs-toggle="offcanvas" data-bs-target="#offcanvasCart"
                                        aria-controls="offcanvasCart" onclick="loadCart()">

        <span id="cart-count-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            0
            <span class="visually-hidden">товаров в корзине</span>
        </span>

                                    <i class="fa-solid fa-cart-shopping"></i>
                                </button>

                                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasCart" aria-labelledby="offcanvasCartLabel">
                                    <div class="offcanvas-header">
                                        <h3 class="offcanvas-title" id="offcanvasCartLabel">Корзина товаров</h3>
                                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
                                    </div>
                                    <div class="offcanvas-body">
                                        <table class="table mt-4">
                                            <tbody id="cart-items-table">
                                            <!-- AJAX будет вставлять сюда строки -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>






















                          <div class="dropdown">
                              <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                  EN
                              </button>
                              <ul class="dropdown-menu">
                                  <li><a class="dropdown-item" href="#">EN</a></li>
                                  <li><a class="dropdown-item" href="#">RU</a></li>
                              </ul>
                          </div>








                      </div>









                  </div>




              </div>





          </div>







      </div>









           </header>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
</body>
</html>
