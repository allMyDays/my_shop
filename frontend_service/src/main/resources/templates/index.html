<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Shopping</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/loadingSpinner.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>

<style>
    .category-card {
        cursor: pointer;
        transition: transform .2s, box-shadow .2s;
    }
    .category-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    .category-img {
        height: 200px;
        object-fit: cover;
    }
</style>


<main>

    <!-- Main Container -->
    <div class="container py-5">

        <h1 class="mb-4 text-center">Добро пожаловать в магазин DMARKET</h1>

        <div class="row g-4">

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(1)">
                    <img src="/images/categories/woman_clothes.jpg" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Женская одежда</h5>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(2)">
                    <img src="/images/categories/man_clothes.png" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Мужская одежда</h5>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(3)">
                    <img src="/images/categories/cosmetic.webp" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Косметика</h5>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(4)">
                    <img src="/images/categories/appliances.jpg" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Бытовая техника</h5>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(5)">
                    <img src="/images/categories/gadjets.jpeg" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Электроника</h5>
                    </div>
                </div>
            </div>


            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(6)">
                    <img src="/images/categories/food.jpg" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Продукты питания</h5>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(7)">
                    <img src="/images/categories/furniture.png" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Мебель</h5>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(8)">
                    <img src="/images/categories/books.jpg" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Книги</h5>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card category-card" onclick="onCategoryClick(9)">
                    <img src="/images/categories/pharmacy.jpg" class="card-img-top category-img">
                    <div class="card-body">
                        <h5 class="card-title">Аптека</h5>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function onCategoryClick(categoryId) {

            const params = new URLSearchParams();
            params.append("categoryId", categoryId);

            window.location.href = "/products/get/all?" + params.toString();

        }
    </script>


</main>


<div th:insert="~{fragments/support_chat :: #support-chat}"></div>

<script src="/js/main.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/cart_wish.js"></script>
 </body>
 </html>
