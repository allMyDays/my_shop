<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/rating.css">
    <link rel="stylesheet" href="/css/loadingSpinner.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>

<style>
    .arrow-btn {
        width: 40px;
        height: 40px;
        transition: 0.2s ease;
    }
    .arrow-btn:hover {
        background-color: #f8f9fa;
        transform: translateX(2px);
    }
</style>


<main>
    <div class="container my-4">
        <h2>Ваши заказы</h2>

        <!-- Фильтр -->
        <div class="btn-group mb-3 mt-3" role="group" id="orderFilter">
            <button type="button" class="btn btn-outline-dark active" data-status="ACTIVE">Активные</button>
            <button type="button" class="btn btn-outline-dark" data-status="COMPLETED">Завершенные</button>
            <button type="button" class="btn btn-outline-dark" data-status="CANCELLED">Отмененные</button>
            <button type="button" class="btn btn-outline-dark" data-status="ALL">Все</button>
        </div>

        <!-- Контейнер для заказов -->
        <div id="ordersContainer"></div>

        <!-- Кнопка подгрузки заказов -->
        <div class="text-center mt-3">
            <button id="loadMoreOrdersBtn" class="btn btn-outline-dark" style="display: none">Загрузить ещё</button>
        </div>
    </div>

    <!-- Модальное окно товаров заказа -->
    <div class="modal fade" id="orderItemsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Товары заказа #<span id="modalOrderId"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalItemsContainer">
                    <!-- Здесь будут карточки товаров -->
                </div>
            </div>
        </div>
    </div>
</main>


<div th:insert="~{fragments/support_chat :: #support-chat}"></div>

<!-- меню заказа -->
<div class="modal fade" id="orderMenuModal" tabindex="-1" aria-labelledby="orderMenuModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 id="orderMenuHeader" class="modal-title fs-5" >...</h1>
                <input type="hidden" id="orderIdField" value="">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h3 id="orderMenuBody" class="modal-title fs-5" >...</h3>
            </div>
            <div class="modal-footer">
                <button id="cancelOrderBtn" onclick="confirmCancelOrder()" type="button" class="btn btn-dark" data-bs-dismiss="modal">Отменить заказ</button>
                <button type="button" onclick="tryCreateNewSupportChat(true)" class="btn btn-dark" data-bs-dismiss="modal">Помощь по заказу</button>
                <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<!-- подтверждение отмены заказа -->
<div class="modal fade" id="cancelOrderModal" tabindex="-1" aria-labelledby="cancelOrderModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" >Подтверждение отмены</h1>
            </div>
            <div class="modal-body">
                <h3 class="modal-title fs-5" >Вы уверены, что хотите отменить этот заказ? Данное действие будет необратимым.</h3>
                <div class="form-check mb-3 mt-4">
                    <input type="checkbox" class="form-check-input" id="returnItemsToCart">
                    <label class="form-check-label" for="returnItemsToCart">Вернуть товары в корзину</label>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="cancelOrder()" type="button" class="btn btn-dark" data-bs-dismiss="modal">Да, отменить</button>
                <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>



<script>
    let orderPageOffset = 0;
    let orderSortingStatus = "ACTIVE";
    const ordersContainer = document.getElementById("ordersContainer");
    const loadMoreBtn = document.getElementById("loadMoreOrdersBtn");
    loadMoreBtn.style.display="none";

    async function loadOrders(reset = false) {
        if (reset) {
            orderPageOffset = 0;
            ordersContainer.innerHTML = "";
        }

        const response = await fetch(`/api/order?sortingStatus=${orderSortingStatus}&offset=${orderPageOffset}`);
        const orders = await response.json();

        if (orders.length === 0 && orderPageOffset === 0) {
            ordersContainer.innerHTML = "<p class='text-muted'>Заказов по выбранному критерию нет!</p>";
            loadMoreBtn.style.display="none";
            return;
        }
        if(orders.length<40) loadMoreBtn.style.display="none";
        else loadMoreBtn.style.display="";

        orders.forEach(order => renderOrder(order));
        orderPageOffset += orders.length;
    }

    function renderOrder(order) {
        const orderEl = document.createElement("div");
        orderEl.className = "card mb-3 p-3 shadow-sm";

        // Показываю только первые 5 товаров
        const previewItems = order.itemDTOs.slice(0, 5).map(item => `
        <div class="me-2 text-center mx-4">
            <a href="/products/get/${item.productId}" target="_blank">
                <img src="/api/media/get/${item.previewImageFileName}" alt="${item.title}"
                     style="width: 60px; height: 60px; object-fit: cover;" class="rounded border">
            </a>
            <div>
                <strong class="small text-truncate" style="max-width: 70px;">${item.title}</strong>
                <div class="text-secondary">Количество: ${item.productQuantity}</div>
                <div class="text-secondary">${item.priceInt + '₽ за ед.'}</div>
                <div class="text-secondary">${(item.priceInt * item.productQuantity) + '₽ общая стоимость'}</div>
            </div>
        </div>
    `).join("");

        // Если товаров больше 5 — добавляю стрелку
        let arrowButton = "";

        if (order.uniqueItemQuantity> 5) {
            arrowButton = `
            <button onclick="openOrderItemsModal(${order.id}, ${order.commonItemQuantity})"
                style="
                    background: none;
                    border: none;
                    color: black;
                    font-size: 36px;
                    font-weight: bold;
                    line-height: 1;
                    margin-left: 10px;
                    cursor: pointer;
                    transition: transform 0.2s;
                "
                title="Показаны только первые 5 товаров. Нажмите, чтобы посмотреть все."
                onmouseover="this.style.transform='translateX(3px)'"
                onmouseout="this.style.transform='translateX(0)'">
                ➜
            </button>
        `;
        }

        orderEl.innerHTML = `
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <div><strong>Создан:</strong> ${new Date(order.dateOfCreation).toLocaleString()}</div>
                <div class="mt-2"><strong>Статус:</strong> ${order.orderStatusView}</div>
                <div class="mt-2"><strong>Стоимость товаров:</strong> ${order.totalPriceView}</div>
                <div class="mt-2"><strong>Количество товаров:</strong> ${order.commonItemQuantity}</div>
                <div class="mt-2"><strong>Стоимость доставки:</strong> ${order.deliveryPriceView}</div>
            </div>
            <div>
                <button class="btn btn-sm border-0 text-dark"
        style="background: none; font-size: 25px; font-weight: 900; line-height: 1;"
        onclick="showOrderMenu(${order.id}, '${order.address}', ${order.orderStatus==="CANCELLED"})">
        ⋮
                </button>
            </div>
        </div>

        <hr>
        <div class="d-flex flex-row align-items-center overflow-auto">
            ${previewItems}
            ${arrowButton}
        </div>
    `;

        ordersContainer.appendChild(orderEl);
    }





    function showOrderMenu(orderId, address, cancelled) {

        document.getElementById("orderMenuHeader").textContent=`Заказ #${orderId}`;

        document.getElementById("orderMenuBody").textContent=`Адрес доставки:\n\n${address}`;

        document.getElementById("orderIdField").value = orderId;

        const cancelledBtn = document.getElementById("cancelOrderBtn");

        if(cancelled===true) cancelledBtn.style.display="none";
        else cancelledBtn.style.display="";

        new bootstrap.Modal(document.getElementById('orderMenuModal')).show();

    }

    function confirmCancelOrder(){
        new bootstrap.Modal(document.getElementById('cancelOrderModal')).show();
    }

    async function cancelOrder() {
        const orderId = document.getElementById("orderIdField").value;

        const returnItemsToCart = document.getElementById("returnItemsToCart").checked;

        const response = await fetch(`/api/order/cancel?orderId=${orderId}&returnItemsToCart=${returnItemsToCart}`, { method: 'PUT' });
        if (response.ok) {
            alert("Заказ отменён");
            loadOrders(true);

            if(returnItemsToCart===true){
                document.getElementById("closingCart").click();

                setInterval(() => { loadCartSize();}, 700);
            }

        }
        else {
            const text = await response.text();
            alert("Ошибка:  " + text);
        }
    }

    // ======== Модалка с товарами ========

    let itemsOffset = 0;
    let currentOrderId = null;

    async function openOrderItemsModal(orderId, orderQuantity) {
        currentOrderId = orderId;
        itemsOffset = 0;
        document.getElementById("modalOrderId").textContent = orderId + " ("+orderQuantity+" шт.)";
        document.getElementById("modalItemsContainer").innerHTML = "";

        const modal = new bootstrap.Modal(document.getElementById("orderItemsModal"));
        modal.show();

        await loadOrderItems();
    }

    async function loadOrderItems() {
        const response = await fetch(`/api/order/items?orderId=${currentOrderId}&offset=${itemsOffset}`);
        const items = await response.json();

        const container = document.getElementById("modalItemsContainer");

        items.forEach(item => {
            container.innerHTML += `
            <div class="card mb-2 p-2 d-flex flex-row align-items-center mt-2">
                <a href="/products/get/${item.productId}" target="_blank">
                <img src="/api/media/get/${item.previewImageFileName}" style="width: 70px; height: 70px; object-fit: cover;" class="rounded me-3">
                </a>
                <div>
                    <strong class="ms-3">${item.title}</strong>
                    <strong class="ms-4">Кол-во:</strong> ${item.productQuantity}
                    <strong class="ms-4">Цена за ед:</strong> ${(item.priceInt)+"₽"}
                    <strong class="ms-4">Итого:</strong> ${(item.productQuantity*item.priceInt)+"₽"}
                </div>
            </div>
        `;
        });

        itemsOffset += items.length;
    }

    // Подгрузка при прокрутке модалки до конца
    document.getElementById("orderItemsModal").addEventListener("scroll", async (e) => {
        const el = e.target;
        if (el.scrollTop + el.clientHeight >= el.scrollHeight - 10) {
            await loadOrderItems();
        }
    });

    // ======== Фильтрация ========

    document.getElementById("orderFilter").addEventListener("click", (e) => {
        if (e.target.dataset.status) {
            document.querySelectorAll("#orderFilter button").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");
            orderSortingStatus = e.target.dataset.status;
            loadOrders(true);
        }
    });

    // Загрузка при входе
    loadOrders();


</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
<script src="/js/cart_wish.js"></script>
</body>
</html>
