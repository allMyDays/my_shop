server:
  port: 8083
spring:
  application:
    name: frontend-service
  flyway:
    enabled: false
  threads:
   virtual:
     enabled: true
  main:
   keep-alive: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8084/realms/my_realm
eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka/
