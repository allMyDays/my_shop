server:
  port: 8082
  grpc:
    port: 82

spring:
  application:
    name: catalogue-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: product-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"  #десериализация любых объектов





  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8084/realms/my_realm
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: postgres
    password: igor333333
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: create
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
  thymeleaf:
    enabled: true
  freemarker:
    enabled: false

  threads:
    virtual:
      enabled: true

  main:
    keep-alive: true # не хавершит приложение,если все активные потоки - виртуальные

logging:
  level:
    org:
      springframework: debug

eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka/

  instance:
    metadata-map:
      grpc-port: ${server.grpc.port}