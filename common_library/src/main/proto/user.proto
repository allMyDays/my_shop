syntax = "proto3";

option java_package="com.example.common.grpc.user";

service UserService {
  rpc CheckUserExists (CheckUserRequest) returns (CheckUserResponse) {}
  rpc GetUserInfoByUserKeycloakId (UserKeycloakIdRequest) returns (UserInfoResponse) {}
  rpc GetUserInfoByUserEntityId (UserEntityIdRequest) returns (UserInfoResponse) {}
  rpc CheckEmailChanged (EmailCheckRequest) returns (StatusResponse) {}
  rpc GetUserMinimalInfo (UserEntityIdsRequest) returns (UserMinimalInfoOuterResponse){}
}

message UserKeycloakIdRequest {
  string user_keycloak_id=1;
}
message UserEntityIdRequest {
  int64 user_entity_id=1;
}

message UserEntityIdsRequest {
  repeated int64 user_entity_ids=1;
}

message CheckUserRequest {
  optional string email = 1;
  optional string username = 2;
  optional string excluded_user = 3;
}

message CheckUserResponse {
  enum ExistenceStatus{
    NOT_EXISTS = 0;
    EMAIL_EXISTS = 1;
    USERNAME_EXISTS = 2;
  }
  ExistenceStatus existenceStatus=1;
}
message UserInfoResponse {
  int64 id = 1;

  string nick_name = 2;

  string email = 3;

  string firstName = 4;

  string lastName = 5;

  optional string avatarFileName = 6;

  optional string fullAddress = 7;
}

message UserMinimalInfoOuterResponse{

  repeated UserMinimalInfoInnerResponse user_minimal_info=1;
}
message UserMinimalInfoInnerResponse{

  int64 user_id = 1;

  string user_visible_name = 2;

  optional string avatar_file_name=3;


}


message EmailCheckRequest {
  string user_keycloak_id =1;
  string email = 2;
}

message StatusResponse {
  bool success = 1;
}
