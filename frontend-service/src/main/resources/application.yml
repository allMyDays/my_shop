server:
  port: 8083
spring:
  application:
    name: frontend-service
  flyway:
    enabled: false
  threads:
   virtual:
     enabled: true
  main:
   keep-alive: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST}:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
eureka:
  client:
    service-url:
      defaultZone:
        http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/
