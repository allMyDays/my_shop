syntax = "proto3";

option java_package = "com.example.catalogue.grpc";
//option java_outer_classname = "CategoryProto";

import "google/protobuf/empty.proto";


service CategoryService{

  rpc GetAllCategories (google.protobuf.Empty) returns (CategoryResponseList);


}

message CategoryResponse {
  int64 id = 1;
  string name = 2;
}

message CategoryResponseList{

  repeated CategoryResponse categories = 1;

}