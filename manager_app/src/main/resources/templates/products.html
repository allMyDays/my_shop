<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>
<main>
    <div th:if="${productRecords.size==0}" class="container-fluid main">
    <h1 class="pt-5">Похоже, что по данному запросу товаров нет!</h1>
    </div>


 <div class="container mt-5">
     <div class="row row-cols-1 row-cols-md-3 g-4">
         <div th:each="productRecord:${productRecords}">
          <div class="col">
             <div class="card">
                 <a th:href="@{/product_info/{id}(id=${productRecord.id})}" target="_blank"><img src="..." class="card-img-top" alt="product_photo"></a>
                 <div class="card-body">
                     <h5 class="card-title" th:text="${productRecord.price}+₽">Card title</h5>
                     <p class="card-text" th:text="${productRecord.title}">Card title</p>
                     <a th:href="@{/product_to_bucket/{id}(id=${productRecord.id})}" class="btn btn-dark">Добавить в корзину</i></a>
                 </div>
             </div>
          </div>
         </div>

     </div>

 </div>



</main>









<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/cart.js"></script>
</body>
</html>
