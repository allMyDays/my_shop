<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>





<main>
    <div th:if="${products.size == 0}" class="container-fluid main">
        <h1 class="pt-5">Похоже, что по данному запросу товаров нет!</h1>
    </div>

    <div class="container mt-5">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="product : ${products}">
                <div class="card h-100">
                    <a th:href="@{/product_page/{id}(id=${product.id})}" target="_blank">
                        <img th:src="@{/api/images/get_product_image/{fileName}(fileName=${product.previewImageFileName})}" class="card-img-top" alt="product_photo" width="100" height="450" >
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${product.price + '₽'}">Цена</h5>
                        <p class="card-text flex-grow-1" th:text="${product.title}">Название</p>

                        <div class="d-flex justify-content-between mt-auto">
                            <div sec:authorize="isAuthenticated()">
                            <!-- Кнопка "В корзину" -->
                            <button class="btn btn-dark cart-btn"
                                    th:attr="data-product-id=${product.id}">
                                В корзину <i class="fa-solid fa-cart-shopping"></i>
                            </button>

                            <!-- Кнопка "Избранное" -->
                            <button class="btn btn-light wish-btn"
                                    th:attr="data-product-id=${product.id}">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                            </div>
                            <div sec:authorize="!isAuthenticated()">
                                <a href="/login"><button type="button" class="btn btn-outline-danger">Войти на сайт</button></a>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>







<div th:insert="~{fragments/support_chat :: #support-chat}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
<script src="/js/cart_wish.js"></script>
<script src="/js/cards_interactions.js"></script>
</body>
</html>
