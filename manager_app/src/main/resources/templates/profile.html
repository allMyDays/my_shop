<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/profile.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>
<main>

    <div class="container-fluid main">

        <h1 class="pt-5">Вы можете отредактировать данные своего профиля:</h1>

        <div class="main-input">
            <form class="pt-5" id="profile-form">



                <div class="text-center my-4">
                    <div class="avatar-wrapper">
                        <img th:src="${user.avatarFileName == null} ? '/images/default-avatar.jpg' : '/api/images/get_user_avatar/' + ${user.avatarFileName}"
                             id="user-avatar" alt="User Avatar">

                        <div class="avatar-overlay">
                            <label class="btn btn-sm btn-light mb-1">
                                Загрузить
                                <input type="file" onchange="uploadAvatar(this)" hidden>
                            </label>

                            <button id="deleteBtn"
                                    th:style="${user.avatarFileName == null} ? 'display:none;' : 'display:inline-block;'"
                                    class="btn btn-sm btn-danger"
                                    onclick="deleteAvatar()">
                                Удалить
                            </button>
                        </div>
                    </div>
                </div>




                <div class="alert alert-success" role="alert">Поля, которые не хотите менять, можно оставить пустыми.</div>

                <label for="nickName" class="col-sm-2 col-form-label"><h6>Ваш никнейм:</h6></label>
                <input type="text" th:value="${user.nickName}" class="form-control" name="nickName" id="nickName" readonly>

                <label for="firstName" class="col-sm-2 col-form-label"><h6>Имя:</h6></label>
                <input type="text" th:value="${user.firstName}" class="form-control" name="firstName" id="firstName">

                <label for="lastName" class="col-sm-2 col-form-label"><h6>Фамилия:</h6></label>
                <input type="text" th:value="${user.lastName}" class="form-control" name="lastName" id="lastName">


                <label for="email" class="col-sm-2 col-form-label"><h6>Email: </h6></label>
                <input type="email" th:value="${user.email}" class="form-control" name="email" id="email">


                <label for="password" class="col-sm-2 col-form-label"><h6>Пароль: </h6></label>
                <input type="password"  class="form-control" name="password" id="password">


                <label for="repeatedPassword" class="col-sm-2 col-form-label"><h6>Повтор пароля: </h6></label>
                <input type="password"  class="form-control" name="repeatedPassword" id="repeatedPassword">


                <button type="submit" class="btn btn-dark mt-4">Сохранить</button>
                </form>

                <!-- Код подтверждения -->
            <div id="code-block" style="display:none;" class="mt-4">
                <p id="code-timer-text" class="text-info"></p>
                <input class="form-control my-2" id="code" placeholder="Введите код">
                <button class="btn btn-primary" onclick="verifyCode(false)">Подтвердить</button>
            </div>

            <div id="message-block" class="mt-3"></div>
        </div>












</main>
<div th:insert="~{fragments/support_chat :: #support-chat}"></div>








<script th:inline="javascript">
    const userId = /*[[${user.id}]]*/ 0;
</script>


<script>
    function uploadAvatar(input) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);
       // formData.append("userId", userId);

        fetch("api/images/save_user_avatar", {
            method: "POST",
            body: formData
        })
            .then(res => {
                if (res.ok) {
                    return res.text();
                }
                throw new Error("Ошибка при загрузке аватара");
            })
            .then(() => {
                document.getElementById("user-avatar").src = URL.createObjectURL(file);
                document.getElementById("deleteBtn").style.display = "inline-block";
            })
            .catch(err => {
                alert(err.message);
            });
    }

    function deleteAvatar() {
        const params = new URLSearchParams({ userId: userId });

        fetch("api/images/delete_user_avatar", {
            method: "DELETE"
        })
            .then(res => {
                if (res.ok) {
                    document.getElementById("user-avatar").src = "/images/default-avatar.jpg";
                    document.getElementById("deleteBtn").style.display = "none";
                } else {
                    throw new Error("Ошибка при удалении аватара");
                }
            })
            .catch(err => {
                alert(err.message);
            });
    }


</script>
<script src="/js/main.js"></script>
<script src="/js/email_verification.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/cart_wish.js"></script>

</body>
</html>
