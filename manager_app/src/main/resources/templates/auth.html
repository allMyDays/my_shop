<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>
<main>

       <div class="container-fluid main">

         <h1 class="pt-5">Впервые на сайте? Создайте аккаунт!</h1>

         <div class="main-input">
             <form class="pt-5" name="auth-form" method="post" action="/new_user" th:object="${user}" onsubmit="validateForm()">
                 <label for="name" class="col-sm-2 col-form-label"><h6>Ваше имя: </h6></label>
                 <div class="alert alert-danger" role="alert">Обязательное поле</div>
                 <input type="text" class="form-control" name="name" id="name" th:field="*{name}">


                 <label for="email" class="col-sm-2 col-form-label"><h6>Email: </h6></label>
                 <div class="alert alert-danger" role="alert">Обязательное поле</div>
                 <input type="email" class="form-control" name="email" id="email" th:field="*{email}">


                 <label for="password" class="col-sm-2 col-form-label"><h6>Пароль: </h6></label>
                 <div class="alert alert-danger" role="alert">Обязательное поле</div>
                 <input type="password"  class="form-control" name="password" id="password"  th:field="*{password}">


                 <label for="password2" class="col-sm-2 col-form-label"><h6>Повторите пароль: </h6></label>
                 <div class="alert alert-danger" role="alert">Обязательное поле</div>
                 <input type="password"  class="form-control" name="password2" id="password2"  th:field="*{matchingPassword}">

                 <button type="submit" class="btn btn-dark mt-4">Зарегистрироваться</button><form/>

                 <div th:if="${emailExists}" class="alert alert-danger" role="alert">Пользователь с таким email уже зарегистрирован!</div>

                 <div/>

             </form>

         </div>
       </div>







</main>









<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    function validateForm(){
        var name = document.forms["auth-form"]["name"].value;
        var email = document.forms["auth-form"]["email"].value;
        var password = document.forms["auth-form"]["password"].value;
        var password2 = document.forms["auth-form"]["password2"].value;

        if(name===""||email===""||password===""||password2===""){
            alert("Упс! Похоже, что вы не заполнили все обязательные поля!")
            return false;

        }
        return true;




    }

</script>
</body>
</html>
