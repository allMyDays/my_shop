<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>





<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <img th:src="@{/api/images/get_product_image/{file}(file=${product.previewImageFileName})}" class="img-fluid rounded shadow"
                 alt="Фото товара" width="500" height="900" data-bs-toggle="modal" data-bs-target="#imageModal" style="cursor:pointer;" >
        </div>
        <div class="col-md-6 d-flex flex-column justify-content-between">
            <div>
                <h1 th:text="${product.title}" class="fw-bold mb-3"></h1>

                <p class="text-muted"
                   style="white-space: pre-line; word-wrap: break-word;"
                   th:text="${product.description}">
                </p>


                <h1 class="fw-bold text-success mt-4">
                    <span th:text="${product.price + '₽'}"></span>
                </h1>
            </div>

            <!-- Кнопки -->
            <div class="mt-4 d-flex gap-3">
                <!-- Кнопка корзины -->
                <button type="button"
                        class="btn btn-dark cart-btn"
                        th:attr="data-product-id=${product.id}">
                    В корзину <i class="fa-solid fa-cart-shopping ms-1"></i>
                </button>

                <!-- Кнопка избранного -->
                <button type="button"
                        class="btn btn-outline-secondary wish-btn"
                        th:attr="data-product-id=${product.id}">
                    <i class="fa-solid fa-heart fs-4"></i>
                </button>
            </div>
        </div>
    </div>
</main>





<!-- Modal для увеличенного изображения -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-body text-center p-0" data-bs-dismiss="modal">
                <img th:src="@{/api/images/get_product_image/{fileName}(fileName=${product.previewImageFileName})}" class="img-fluid rounded" alt="full_image">
            </div>
        </div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/js/main.js"></script>
<script src="/js/cart_wish.js"></script>
<script src="/js/cards_interactions.js"></script>
</body>
</html>
