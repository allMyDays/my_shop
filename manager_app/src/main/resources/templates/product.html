<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>

<style>
    .product-view-container {
        display: flex;
        gap: 20px;
        margin-top: 40px;
        justify-content: center;
        align-items: flex-start;
    }

    .thumbnail-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 80px;
        max-height: 500px;
    }

    .thumbnails {
        overflow: hidden;
        max-height: 400px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scroll-behavior: smooth;
    }

    .thumbnail-img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border 0.3s;
    }

    .thumbnail-img:hover {
        border: 2px solid #333;
    }

    .scroll-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #555;
        padding: 5px;
    }

    .scroll-btn:hover {
        color: black;
    }

    .main-preview {
        width: 400px;
        height: 500px;
        object-fit: contain;
        border-radius: 10px;
        border: 1px solid #ccc;
        cursor: pointer;
    }
</style>

<main class="container py-5">
    <div class="row justify-content-center">

        <div class="container product-view-container">
            <!-- Список миниатюр -->
            <div class="thumbnail-container">
                <button class="scroll-btn up" onclick="scrollThumbnails(-1)">▲</button>
                <div class="thumbnails" id="thumbnailList">
                    <img th:each="img : ${product.imageFileNames}"
                         th:src="@{/api/images/get_product_image/{file}(file=${img})}"
                         onclick="changePreview(this)"
                         alt="thumb"
                         class="thumbnail-img">
                </div>
                <button class="scroll-btn down" onclick="scrollThumbnails(1)">▼</button>
            </div>

            <!-- Главное изображение -->
            <div class="col-md-6">
                <img th:src="@{/api/images/get_product_image/{file}(file=${product.previewImageFileName})}"
                     class="img-fluid rounded shadow main-preview"
                     id="previewImage"
                     alt="Фото товара"
                     style="cursor: pointer;">
            </div>
        </div>

        <!-- Описание и кнопки -->
        <div class="col-md-6 d-flex flex-column justify-content-between my-5">
            <div>
                <h1 th:text="${product.title}" class="fw-bold mb-3"></h1>
                <p class="text-muted"
                   style="white-space: pre-line; word-wrap: break-word;"
                   th:text="${product.description}"></p>

                <h1 class="fw-bold text-success mt-4">
                    <span th:text="${product.price + '₽'}"></span>
                </h1>
            </div>

            <!-- Кнопки -->
            <div class="mt-4 d-flex gap-3">
                <div sec:authorize="isAuthenticated()">
                    <button type="button"
                            class="btn btn-dark cart-btn"
                            th:attr="data-product-id=${product.id}">
                        В корзину <i class="fa-solid fa-cart-shopping ms-1"></i>
                    </button>

                    <button type="button"
                            class="btn btn-outline-secondary wish-btn mx-1"
                            th:attr="data-product-id=${product.id}">
                        <i class="fa-solid fa-heart fs-4"></i>
                    </button>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a href="/login">
                        <button type="button" class="btn btn-outline-danger">Войти на сайт</button>
                    </a>
                </


                div>
            </div>
        </div>
    </div>
</main>

<div th:insert="~{fragments/support_chat :: #support-chat}"></div>

<!-- Модальное окно с изображением -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-body text-center p-0">
                <img id="modalImage" class="img-fluid rounded" alt="full_image">
            </div>
        </div>
    </div>
</div>

<!-- Скрипты -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/cart_wish.js"></script>
<script src="/js/cards_interactions.js"></script>

<script>
    function scrollThumbnails(direction) {
        const container = document.getElementById("thumbnailList");
        const scrollAmount = 70;
        container.scrollBy({
            top: scrollAmount * direction,
            behavior: "smooth"
        });
    }

    function changePreview(imgElement) {
        const newSrc = imgElement.src;
        const mainPreview = document.getElementById("previewImage");
        mainPreview.src = newSrc;

        // Обновляем картинку в модалке, но не показываем модалку
        document.getElementById("modalImage").src = newSrc;
    }

    document.addEventListener("DOMContentLoaded", () => {
        // При клике на главное изображение — открываем модалку
        document.getElementById("previewImage").addEventListener("click", () => {
            const modal = new bootstrap.Modal(document.getElementById("imageModal"));
            modal.show();
        });
    });
</script>

</body>
</html>
