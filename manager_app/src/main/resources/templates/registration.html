<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>

<div class="container-fluid main">
  <h2 class="pt-5">Впервые на сайте? Создайте аккаунт!</h2>

  <form id="registration-form" class="pt-5">

    <label for="nickName" class="col-sm-2 col-form-label"><h6>Ваш никнейм: </h6></label>
    <input class="form-control my-2" name="nickName" placeholder="Никнейм" id="nickName">

    <label for="firstName" class="col-sm-2 col-form-label"><h6>Ваше имя: </h6></label>
    <input class="form-control my-2" name="firstName" placeholder="Имя" id="firstName">

    <label for="lastName" class="col-sm-2 col-form-label"><h6>Ваша фамилия: </h6></label>
    <input class="form-control my-2" name="lastName" placeholder="Фамилия" id="lastName">

    <label for="email" class="col-sm-2 col-form-label"><h6>Email: </h6></label>
    <input class="form-control my-2" name="email" id="email" placeholder="Email">

    <label for="password" class="col-sm-2 col-form-label"><h6>Пароль: </h6></label>
    <input class="form-control my-2" name="password" type="password" placeholder="Пароль" id="password">

    <label for="repeatedPassword" class="col-sm-2 col-form-label"><h6>Повторите пароль: </h6></label>
    <input class="form-control my-2" name="repeatedPassword" type="password" placeholder="Повторите пароль" id="repeatedPassword">
    <button class="btn btn-dark mt-2" type="submit">Зарегистрироваться</button>
  </form>

  <div id="code-block" style="display:none;" class="mt-4">
    <p id="code-timer-text" class="text-info"></p>
    <input class="form-control my-2" id="code" placeholder="Введите код">
    <button class="btn btn-primary" onclick="verifyCode()">Подтвердить</button>
  </div>

  <div id="message-block" class="mt-3"></div>
</div>

<script>
  let emailVerified = false;

  document.getElementById("registration-form").addEventListener("submit", function (e) {
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);
    formData.append("isVerified", emailVerified);

    fetch("/registration", {
      method: "POST",
      body: new URLSearchParams(formData)
    })
            .then(res => res.json())
            .then(data => {
              const msg = document.getElementById("message-block");
              msg.innerHTML = "";

              if (data.errors) {
                data.errors.forEach(err => {
                  msg.innerHTML += `<div class="alert alert-danger">${err}</div>`;
                });
                return;
              }

              if (data.emailSent) {
                msg.innerHTML = `<div class="alert alert-info">На адрес <b>${formData.get("email")}</b> был отправлен код. Введите его в течение 15 минут.</div>`;
                document.getElementById("email").readOnly = true;
                document.getElementById("code-block").style.display = "block";
                startTimer(15 * 60);
              }

              if (data.userCreationSuccess) {
                msg.innerHTML = `<div class="alert alert-success">Вы успешно зарегистрировались! Теперь можете войти в аккаунт через кнопку «Вход».</div>`;
                emailVerified = true;
                document.getElementById("code-block").style.display = "none";
              }
            });
  });
  function verifyCode() {
    const email = document.getElementById("email").value;
    const code = document.getElementById("code").value;

    fetch("/verify_email", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        email: email,
        code: code
      })
    })
            .then(res => {
              if (!res.ok) throw new Error("Ошибка ответа от сервера");
              return res.json();
            })
            .then(data => {
              console.log("Ответ сервера:", data); // для отладки
              const msg = document.getElementById("message-block");
              msg.innerHTML = "";

              if (data.success) {
                msg.innerHTML = `<div class="alert alert-success">Email подтверждён! Можете продолжить регистрацию.</div>`;
                emailVerified = true;
                document.getElementById("code-block").style.display = "none";
              } else if (data.expired) {
                msg.innerHTML = `<div class="alert alert-warning">Срок действия кода истёк. Пожалуйста, запросите новый.</div>`;
              } else if (data.notMatch) {
                msg.innerHTML = `<div class="alert alert-danger">Введённый код неверен. Попробуйте ещё раз.</div>`;
              } else {
                msg.innerHTML = `<div class="alert alert-danger">Неизвестная ошибка. Попробуйте позже.</div>`;
              }
            })
            .catch(err => {
              console.error("Ошибка при проверке кода:", err);
              document.getElementById("message-block").innerHTML =
                      `<div class="alert alert-danger">Произошла ошибка при отправке запроса.</div>`;
            });
  }

  function startTimer(duration) {
    let timer = duration;
    const display = document.getElementById("code-timer-text");

    const interval = setInterval(() => {
      const minutes = String(Math.floor(timer / 60)).padStart(2, '0');
      const seconds = String(timer % 60).padStart(2, '0');
      display.textContent = `Осталось времени: ${minutes}:${seconds}`;

      if (--timer < 0) {
        clearInterval(interval);
        display.textContent = "Срок действия кода истёк.";
      }
    }, 1000);
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
