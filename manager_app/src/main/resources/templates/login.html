<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div th:insert="~{fragments/menu :: #nav-menu}"></div>
<main>

    <div class="container-fluid main">

        <h1 class="pt-5">Уже зарегистрированы? Войдите на сайт!</h1>

        <div class="main-input">
            <form class="pt-5" name="f" method="post" action="/process_login">
           <label for="username" class="col-sm-2 col-form-label"><h6>Email: </h6></label>
            <input type="email" class="form-control" name="username" id="username">
            <br/>
            <label for="password" class="col-sm-2 col-form-label"><h6>Пароль: </h6></label>
            <input type="password"  class="form-control" name="password" id="password">
            <br/>
            <button type="submit" class="btn btn-dark">Войти</button><form/>
        <div/>


            </form>

            <div th:if="${loginError}" class="alert alert-danger mt-4" role="alert">
                Неверный email или пароль.
            </div>







    </div>




</main>









<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
