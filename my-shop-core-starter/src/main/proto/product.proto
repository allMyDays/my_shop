syntax = "proto3";

option java_package="com.example.common.grpc.product";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

import "category.proto";



service ProductService{

  rpc GetProductById (ProductRequestById) returns (ProductResponse);

  rpc ProductExists (ProductRequestById) returns (ProductBooleanResponse);

  rpc ProductsExist (ProductRequestBySingleIds) returns (ProductResponseBySingleIds);

  rpc GetAllProducts (ProductRequestByFilterAndCategory) returns (stream ProductResponse);

  rpc GetProductsByIds (ProductRequestByIds) returns (stream ProductResponse);

  rpc getTotalPrice (ProductIdAndQuantityDtoOuterResp)  returns(TotalPriceResponse);

  rpc getProductsPrice (ProductRequestBySingleIds)  returns (ProductIdAndPriceOuterResp);


}



message ProductIdAndQuantityDtoOuterResp{
  repeated ProductIdAndQuantityDtoInnerResp productInnerResp  = 1;
}

message ProductIdAndQuantityDtoInnerResp{

  int64 productId=1;

  int32 productQuantity=2;

}


message ProductRequestById{
  int64 id = 1;
}

message TotalPriceResponse{
  int32 price = 1;
}

message ProductRequestBySingleIds{
  repeated int64 ids = 1;
}

message ProductResponseBySingleIds{
  repeated int64 ids = 1;
}




message ProductRequestByIds{

  repeated int64 ids = 1;

  int32 offset = 2;

  int32 limit = 3;

}
message ProductRequestByFilterAndCategory{

  optional CategoryEnum category = 1;

  optional string filter = 2;

  int32 offset = 3;

}

message ProductResponse{

  int64 id = 1;

  string title = 2;

  string description =3;

  int32 price = 4;

  repeated CategoryResponse categories = 5;

  google.protobuf.Timestamp date_of_creation = 6;

  string preview_image_file_name = 7;

  repeated string image_file_names = 8;

  string article = 9;


}
message ProductBooleanResponse{

  bool exists = 1;

}

message ProductResponseList{

  repeated ProductResponse products = 1;

}

message ProductIdAndPriceOuterResp{
  repeated ProductIdAndPriceInnerResp productInnerResp = 1;
}

message ProductIdAndPriceInnerResp {

  int64 productId = 1;

  int32 productPrice = 2;

}

enum CategoryEnum{
    WOMAN_CLOTHES = 0;
    MAN_CLOTHES = 1;
    COSMETIC=2;
    APPLIANCES=3;
    ELECTRONICS=4;
    FOOD=5;
    FURNITURE=6;
    BOOKS=7;
    PHARMACY=8;
}

